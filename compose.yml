services:
  postgres:
    image: postgres:17-alpine
    container_name: hanbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hanbit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - hanbit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hanbit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hanbit_postgres_data:
